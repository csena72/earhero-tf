name: CI + Deploy — EarHero AI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    name: Tests + Cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Instalar navegador para Playwright
        run: python -m playwright install --with-deps chromium

      - name: Ejecutar suite con cobertura
        run: |
          pytest --cov --cov-report=term-missing \
                 --cov-report=xml:coverage.xml \
                 --cov-report=html:coverage_html \
                 --cov-fail-under=90

      - name: Publicar reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage_html/

  deploy:
    name: Deploy a Render
    runs-on: ubuntu-latest
    needs: tests                       # Solo corre si los tests pasaron
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Deploy automático vía API de Render
        run: |
          python tools/deploy_render.py \
            --token "${{ secrets.RENDER_API_KEY }}" \
            --repo "${{ github.repository }}" \
            --secret "${{ secrets.EARHERO_SECRET }}"
        # Si RENDER_API_KEY no está configurado el step falla con mensaje claro.
        # Para configurarlo: GitHub repo → Settings → Secrets → Actions → New secret
        #   RENDER_API_KEY  = tu API key de https://dashboard.render.com/u/settings
        #   EARHERO_SECRET  = un string largo aleatorio (para firmar los JWT)